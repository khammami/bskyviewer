<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' https:; font-src 'self';" />
    <link rel="icon" href="data:," />
    <title>Bluesky viewer</title>

    <script>
      // Prevent flash of wrong theme (FOUC)
      (function () {
        var t = localStorage.getItem('theme');
        var d = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (d) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body class="bg-white dark:bg-black text-contrast-1000 dark:text-contrast-0 transition-colors duration-200">
    <noscript>
      This app requires JavaScript. There is no server component as it runs all
      requests from your browser.
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
